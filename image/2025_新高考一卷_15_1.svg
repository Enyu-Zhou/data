<?xml version="1.0" encoding="UTF-8"?>
<svg width="320" height="180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .table-text { font-family: "SimSun", "Times New Roman", serif; font-size: 12px; text-anchor: middle; }
      .header-text { font-family: "SimSun", "Times New Roman", serif; font-size: 12px; text-anchor: middle; }
    </style>
  </defs>
  
  <!-- 表格外框 -->
  <rect x="10" y="10" width="300" height="160" fill="none" stroke="black" stroke-width="1"/>
  
  <!-- 水平分割线 -->
  <line x1="10" y1="50" x2="310" y2="50" stroke="black" stroke-width="1"/>
  <line x1="10" y1="90" x2="310" y2="90" stroke="black" stroke-width="1"/>
  <line x1="10" y1="130" x2="310" y2="130" stroke="black" stroke-width="1"/>
  
  <!-- 垂直分割线 -->
  <line x1="130" y1="10" x2="130" y2="170" stroke="black" stroke-width="1"/>
  <line x1="200" y1="10" x2="200" y2="170" stroke="black" stroke-width="1"/>
  <line x1="255" y1="10" x2="255" y2="170" stroke="black" stroke-width="1"/>
  
  <!-- 表头 -->
  <text x="70" y="35" class="header-text">检查结果是否患病</text>
  <text x="165" y="35" class="header-text">正常</text>
  <text x="227" y="35" class="header-text">不正常</text>
  <text x="282" y="35" class="header-text">合计</text>
  
  <!-- 第一行数据 -->
  <text x="70" y="75" class="table-text">患该疾病</text>
  <text x="165" y="75" class="table-text">20</text>
  <text x="227" y="75" class="table-text">180</text>
  <text x="282" y="75" class="table-text">200</text>
  
  <!-- 第二行数据 -->
  <text x="70" y="115" class="table-text">未患该疾病</text>
  <text x="165" y="115" class="table-text">780</text>
  <text x="227" y="115" class="table-text">20</text>
  <text x="282" y="115" class="table-text">800</text>
  
  <!-- 第三行数据 -->
  <text x="70" y="155" class="table-text">合计</text>
  <text x="165" y="155" class="table-text">800</text>
  <text x="227" y="155" class="table-text">200</text>
  <text x="282" y="155" class="table-text">1000</text>
</svg>