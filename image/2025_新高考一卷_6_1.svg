<?xml version="1.0" encoding="UTF-8"?>
<svg width="320" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .table-text {
        font-family: "SimSun", "Times New Roman", serif;
        font-size: 14px;
        font-weight: normal;
        text-anchor: middle;
      }

      .header-text {
        font-family: "SimSun", "Times New Roman", serif;
        font-size: 14px;
        font-weight: normal;
        text-anchor: middle;
      }

      .table-border {
        fill: none;
        stroke: black;
        stroke-width: 1;
      }

      .table-line {
        stroke: black;
        stroke-width: 1;
      }
    </style>
  </defs>

  <!-- 表格外框 -->
  <rect x="10" y="10" width="300" height="180" class="table-border" />

  <!-- 水平分割线 - 每行高度36px -->
  <line x1="10" y1="46" x2="310" y2="46" class="table-line" />
  <line x1="10" y1="82" x2="310" y2="82" class="table-line" />
  <line x1="10" y1="118" x2="310" y2="118" class="table-line" />
  <line x1="10" y1="154" x2="310" y2="154" class="table-line" />

  <!-- 垂直分割线 -->
  <line x1="80" y1="10" x2="80" y2="190" class="table-line" />
  <line x1="200" y1="10" x2="200" y2="190" class="table-line" />

  <!-- 表头 - 居中于第一行 -->
  <text x="45" y="32" class="header-text">等级</text>
  <text x="140" y="32" class="header-text">风速大小</text>
  <text x="255" y="32" class="header-text">名称</text>

  <!-- 第一行数据 - 居中于第二行 -->
  <text x="45" y="68" class="table-text">2</text>
  <text x="140" y="68" class="table-text">1.1～3.3</text>
  <text x="255" y="68" class="table-text">轻风</text>

  <!-- 第二行数据 - 居中于第三行 -->
  <text x="45" y="104" class="table-text">3</text>
  <text x="140" y="104" class="table-text">3.4～5.4</text>
  <text x="255" y="104" class="table-text">微风</text>

  <!-- 第三行数据 - 居中于第四行 -->
  <text x="45" y="140" class="table-text">4</text>
  <text x="140" y="140" class="table-text">5.5～7.9</text>
  <text x="255" y="140" class="table-text">和风</text>

  <!-- 第四行数据 - 居中于第五行 -->
  <text x="45" y="176" class="table-text">5</text>
  <text x="140" y="176" class="table-text">8.0～10.1</text>
  <text x="255" y="176" class="table-text">劲风</text>
</svg>